# Pair: Hormuz / Shipping vs Oil
# Situation: May 14 2026 — Trump and Xi agreed Strait of Hormuz should remain
# a free waterway and Iran cannot extract payments for use of shipping lanes.
# This removes a geopolitical constraint on oil transport economics.

pairs:
  - ticker1: ZIM
    ticker2: USO
    label: "Global Shipping vs Crude Oil ETF"
    relationship: >
      The Strait of Hormuz is the world's most critical oil chokepoint —
      roughly 20% of global oil supply transits it daily. When the strait
      is threatened, oil prices rise (supply risk premium) while shipping
      rates for tankers also rise (risk premium plus rerouting demand).
      When the strait is secured or reopened, the relationship inverts:
      oil price risk premium deflates while shipping normalizes.
      ZIM is a global container and tanker shipping operator sensitive to
      route economics and geopolitical risk. USO tracks WTI crude futures.
      Murphy framework: geopolitical constraint on physical commodity flow
      propagates into both the commodity price and the transport cost
      simultaneously — but at different speeds and magnitudes.
      The thesis: Hormuz security agreements should cause USO to deflate
      (Iran risk premium removed) while ZIM stabilizes or rises modestly
      (route normalization reduces cost). A decoupling between them signals
      the market is pricing the geopolitical change asymmetrically.
    lead: USO
    lag_days: 5
    cointegrated: unknown
    sentinel_goals:
      - correlation_decay
    leading_indicators:
      - US Energy Information Administration weekly crude inventory reports
      - Strait of Hormuz vessel tracking data (MarineTraffic, VesselsValue)
      - Iranian oil export volumes (Kpler, Vortexa tanker tracking)
      - OPEC+ production quota announcements
      - Freightos Baltic Index — global container freight rates
      - US State Department Iran sanctions enforcement notices
      - Trump/Xi joint communique follow-up statements on Hormuz
    notes: >
      Catalyst event: May 14 2026 — Trump/Xi Beijing meetings produced
      agreement that Hormuz stays open and Iran cannot extract transit
      payments. This is a direct geopolitical constraint removal on oil
      transport economics. Watch for Iran's response — if Tehran contests
      the agreement the risk premium will reassert immediately.
      ZIM has historically been volatile around Red Sea / Houthi disruption
      events (late 2023, 2024) — use those episodes as historical analogs
      for how quickly the pair decouples under shipping route stress.
      Note: ZIM is Israeli-headquartered — geopolitical events involving
      Israel/Gaza can create ZIM-specific moves unrelated to Hormuz thesis.
      Isolate those events when evaluating episode context.
