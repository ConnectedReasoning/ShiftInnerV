    - KRE    # Regional Bank ETF
    - IAI    # Broker-Dealer ETF
    - JPM    # JPMorgan Chase
    - BAC    # Bank of America
    - GS     # Goldman Sachs
    - MS     # Morgan Stanley
    - BRK-B  # Berkshire Hathaway

  # ── Healthcare & Biotech ──────────────────────────────────────────────────
  healthcare:
    - IBB    # Biotech ETF
    - XBI    # SPDR Biotech ETF
    - PJP    # Pharma ETF
    - JNJ    # Johnson & Johnson
    - PFE    # Pfizer
    - MRNA   # Moderna
    - ABBV   # AbbVie
    - UNH    # UnitedHealth

  # ── AI & Cloud Infrastructure ─────────────────────────────────────────────
