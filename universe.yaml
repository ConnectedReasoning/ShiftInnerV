# ShiftInnerV — S&P 500 Put Skew Universe
#
# Same thesis as universe_dow_skew.yaml but broader:
#   When a stock's put skew spikes relative to its own history (z > +1.0),
#   the options market is pricing in stress the equity hasn't acknowledged.
#   Short the stock. Exit when skew normalises or after 5 days.
#
# Why S&P 500 over Dow 30:
#   The Dow is 30 of the most-analysed stocks in the world. Edge is thin.
#   The S&P 500 includes mid-cap names with less analyst coverage and
#   wider options mispricings — the skew signal has more room to breathe.
#
# Liquidity filter applied:
#   All tickers below have average daily options volume sufficient for
#   reliable IV reads. Pure micro-caps excluded — skew data is too noisy.
#
# Rate limiting note:
#   501 tickers (500 + SPY benchmark) at 1s sleep = ~8 min morning run.
#   skew_monitor.py handles this automatically.
#
# Run with:
#   python sentinel.py

