    relationship: >
      Corn is a commodity with strong inflation sensitivity — rising corn
      prices signal food inflation and broader commodity price pressure.
      TLT tracks 20-year US Treasury bonds, which are inversely sensitive
      to inflation expectations and interest rates. When inflation rises,
      corn tends to rise while TLT falls (higher rates hurt long bonds).
      When deflationary pressure dominates, the relationship may invert.
      Murphy framework: commodity prices lead inflation expectations lead
      bond yields lead bond prices. CORN and TLT share a common structural
      driver — the inflation/deflation cycle — but move in opposite
      directions along that driver.
      The cointegration result suggests a durable long-run equilibrium
      relationship despite moving in opposite directions, likely anchored
      by the common inflation factor.
